<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — Don Fuego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1117;--surface:#181c27;--border:#2a3045;--accent:#f77f00;--text:#e8eaf0;--muted:#8b93a8;--danger:#ef4444;}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:100%;max-width:400px;}
    .brand{text-align:center;margin-bottom:34px;}
    .fire{font-size:44px;margin-bottom:10px;}
    .brand h1{font-size:22px;font-weight:700;}
    .brand h1 span{color:var(--accent);}
    .brand p{color:var(--muted);font-size:13.5px;margin-top:6px;}
    .alert{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171;padding:11px 16px;border-radius:9px;font-size:13.5px;margin-bottom:18px;}
    label{display:block;color:var(--muted);font-size:12.5px;font-weight:500;margin-bottom:7px;}
    input{width:100%;background:#0f1117;border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:.2s;margin-bottom:16px;}
    input:focus{border-color:var(--accent);}
    button{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;margin-top:4px;}
    button:hover{background:#e07000;}
    .back{display:block;text-align:center;color:var(--muted);font-size:13px;text-decoration:none;margin-top:20px;transition:.2s;}
    .back:hover{color:var(--text);}
    .hint{background:rgba(247,127,0,.08);border:1px solid rgba(247,127,0,.2);border-radius:9px;padding:12px 16px;font-size:12.5px;color:var(--muted);margin-top:20px;}
    .hint strong{color:var(--accent);}
    .register-link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
    .register-link a{color:var(--accent);text-decoration:none;font-weight:500;}
    .register-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="fire">🔥</div>
      <h1>DON<span>FUEGO</span></h1>
      <p>Panel de Administración</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="admin" required autofocus>
      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>
      <button type="submit">Iniciar Sesión</button>
    </form>

    <div class="register-link">
      ¿No tienes cuenta? <a href="{{ url_for('registro') }}">Regístrate</a>
    </div>

    <a href="{{ url_for('inicio') }}" class="back">← Volver a la tienda</a>
    
  </div>
</body>
</html>
