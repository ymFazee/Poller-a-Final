<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro — Don Fuego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0f1117;--surface:#181c27;--border:#2a3045;--accent:#f77f00;--text:#e8eaf0;--muted:#8b93a8;--danger:#ef4444;--success:#22c55e;}
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 40px;width:100%;max-width:400px;}
    .brand{text-align:center;margin-bottom:34px;}
    .fire{font-size:44px;margin-bottom:10px;}
    .brand h1{font-size:22px;font-weight:700;}
    .brand h1 span{color:var(--accent);}
    .brand p{color:var(--muted);font-size:13.5px;margin-top:6px;}
    .alert-error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171;padding:11px 16px;border-radius:9px;font-size:13.5px;margin-bottom:18px;}
    .alert-success{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);color:#4ade80;padding:11px 16px;border-radius:9px;font-size:13.5px;margin-bottom:18px;}
    label{display:block;color:var(--muted);font-size:12.5px;font-weight:500;margin-bottom:7px;}
    input, select{width:100%;background:#0f1117;border:1.5px solid var(--border);border-radius:9px;padding:12px 14px;color:var(--text);font-size:14px;outline:none;transition:.2s;margin-bottom:16px;}
    input:focus, select:focus{border-color:var(--accent);}
    select option{background:#0f1117;}
    button{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;transition:.3s;margin-top:4px;}
    button:hover{background:#e07000;}
    .back{display:block;text-align:center;color:var(--muted);font-size:13px;text-decoration:none;margin-top:20px;transition:.2s;}
    .back:hover{color:var(--text);}
    .login-link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
    .login-link a{color:var(--accent);text-decoration:none;font-weight:500;}
    .login-link a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="fire">🔥</div>
      <h1>DON<span>FUEGO</span></h1>
      <p>Crear nueva cuenta</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post">
      <label>Nombre completo</label>
      <input type="text" name="nombre" placeholder="Juan Pérez" required autofocus>

      <label>Usuario</label>
      <input type="text" name="usuario" placeholder="juanperez" required>

      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>

      <label>Confirmar contraseña</label>
      <input type="password" name="password2" placeholder="••••••••" required>

      <label>Rol</label>
      <select name="rol">
        <option value="Operador">Operador</option>
        <option value="Administrador">Administrador</option>
      </select>

      <button type="submit">Crear cuenta</button>
    </form>

    <div class="login-link">
      ¿Ya tienes cuenta? <a href="{{ url_for('login') }}">Inicia sesión</a>
    </div>

    <a href="{{ url_for('inicio') }}" class="back">← Volver a la tienda</a>
  </div>
</body>
</html>
